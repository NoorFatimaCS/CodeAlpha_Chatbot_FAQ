<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha AI Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        #chat-container { 
            width: 450px; 
            height: 600px;
            background: #ffffff; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Styling */
        .chat-header { 
            background: #4e54c8; 
            color: white; 
            padding: 20px; 
            text-align: center;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* Chat Box area */
        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Message Bubbles */
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; }
        
        .user { 
            align-self: flex-end; 
            background: #4e54c8; 
            color: white; 
            border-bottom-right-radius: 2px;
        }

        .bot { 
            align-self: flex-start; 
            background: #e9ecef; 
            color: #333; 
            border-bottom-left-radius: 2px;
        }

        /* Input Area */
        .input-area { 
            padding: 20px; 
            background: white; 
            border-top: 1px solid #eee; 
            display: flex; 
            gap: 10px; 
        }

        input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 25px; 
            outline: none; 
            transition: 0.3s;
        }

        input:focus { border-color: #4e54c8; }

        button { 
            background: #4e54c8; 
            color: white; 
            border: none; 
            padding: 0 20px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover { background: #3f44a1; transform: scale(1.05); }

        /* Scrollbar Styling */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="chat-header">🤖 CodeAlpha AI Assistant</div>
        <div id="chat-box">
            <div class="message bot">Hello Noor! I'm your CodeAlpha assistant. How can I help you with your internship today?</div>
        </div>
        <div class="input-area">
            <input type="text" id="user_input" placeholder="Type your question here..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            let input = document.getElementById("user_input");
            let chatBox = document.getElementById("chat-box");
            let query = input.value.trim();

            if (!query) return;

            // User message add karna
            chatBox.innerHTML += `<div class="message user">${query}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                let response = await fetch('/get_response', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: query})
                });
                let data = await response.json();
                
                // Bot message add karna
                setTimeout(() => {
                    chatBox.innerHTML += `<div class="message bot">${data.answer}</div>`;
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, 500); // Thora natural feel dene ke liye delay
                
            } catch (error) {
                console.error("Error:", error);
            }
        }
    </script>
</body>
</html>
